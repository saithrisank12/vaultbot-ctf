<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NexBank VaultBot — AI Security CTF</title>
  <meta name="description" content="VaultBot: NexBank's AI support assistant. Can you extract the secret flag hidden in its instructions?" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-deep:      #020408;
      --bg-panel:     rgba(6, 12, 28, 0.92);
      --bg-input:     rgba(8, 16, 36, 0.95);
      --blue:         #2563eb;
      --blue-bright:  #3b82f6;
      --cyan:         #06b6d4;
      --cyan-dim:     rgba(6,182,212,0.15);
      --green:        #10b981;
      --amber:        #f59e0b;
      --red:          #ef4444;
      --purple:       #7c3aed;
      --text-hi:      #f1f5f9;
      --text-mid:     #94a3b8;
      --text-lo:      #475569;
      --border:       rgba(56,189,248,0.08);
      --border-glow:  rgba(56,189,248,0.18);
      --shadow-blue:  rgba(37,99,235,0.35);
      --shadow-cyan:  rgba(6,182,212,0.2);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%; overflow: hidden;
      font-family: 'Inter', sans-serif;
      background: var(--bg-deep);
      color: var(--text-hi);
    }

    /* ══════════════════════════════
       CANVAS PARTICLE BACKGROUND
    ══════════════════════════════ */
    #bgCanvas { position: fixed; inset: 0; z-index: 0; opacity: 0.6; }

    /* Radial spotlight */
    .spotlight {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background: radial-gradient(ellipse 60% 50% at 50% 0%, rgba(37,99,235,0.07) 0%, transparent 70%);
    }

    /* ══════════════════════════════
       LAYOUT
    ══════════════════════════════ */
    .shell {
      position: relative; z-index: 1;
      display: flex; flex-direction: column;
      height: 100vh; max-width: 820px;
      margin: 0 auto; padding: 16px 14px 10px;
      gap: 12px;
    }

    /* ══════════════════════════════
       TOP BAR
    ══════════════════════════════ */
    .topbar {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 20px;
      background: var(--bg-panel);
      border: 1px solid var(--border-glow);
      border-radius: 18px;
      backdrop-filter: blur(24px);
      box-shadow: 0 0 0 1px rgba(255,255,255,0.03) inset,
                  0 8px 40px rgba(0,0,0,0.6),
                  0 0 60px rgba(37,99,235,0.08);
      flex-shrink: 0;
    }

    /* Bank logo */
    .bank-logo {
      position: relative; flex-shrink: 0;
      width: 50px; height: 50px;
    }
    .bank-logo svg { width: 100%; height: 100%; }
    .logo-pulse {
      position: absolute; inset: -5px; border-radius: 50%;
      border: 1.5px solid rgba(56,189,248,0.4);
      animation: logoPulse 3s ease-in-out infinite;
    }
    .logo-pulse:nth-child(2) { inset: -10px; opacity: 0.3; animation-delay: 1.5s; }
    @keyframes logoPulse {
      0%, 100% { transform: scale(1); opacity: 0.6; }
      50% { transform: scale(1.08); opacity: 1; }
    }

    /* Brand text */
    .brand { flex: 1; }
    .brand-name {
      font-size: 1.05rem; font-weight: 800; letter-spacing: -0.02em;
      background: linear-gradient(90deg, #93c5fd 0%, #38bdf8 50%, #67e8f9 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .brand-sub {
      font-size: 0.68rem; color: var(--text-lo);
      font-family: 'JetBrains Mono', monospace;
      margin-top: 2px; letter-spacing: 0.04em;
    }

    /* Status indicators */
    .indicators { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }

    .badge {
      display: flex; align-items: center; gap: 5px;
      padding: 5px 11px; border-radius: 30px;
      font-size: 0.68rem; font-weight: 600; letter-spacing: 0.03em;
      font-family: 'JetBrains Mono', monospace;
    }
    .badge-live {
      background: rgba(16,185,129,0.1);
      border: 1px solid rgba(16,185,129,0.3);
      color: #34d399;
    }
    .badge-quota {
      background: rgba(6,182,212,0.08);
      border: 1px solid rgba(6,182,212,0.2);
      color: var(--cyan);
      transition: all .4s ease;
    }
    .badge-quota.warn  { background: rgba(245,158,11,0.1); border-color: rgba(245,158,11,0.3); color: var(--amber); }
    .badge-quota.empty { background: rgba(239,68,68,0.1);  border-color: rgba(239,68,68,0.3);  color: #f87171; }

    .live-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
      animation: liveDot 2s ease-in-out infinite;
    }
    @keyframes liveDot {
      0%,100% { opacity:1; box-shadow: 0 0 6px var(--green); }
      50%      { opacity:.5; box-shadow: 0 0 2px var(--green); }
    }

    /* ══════════════════════════════
       CTF BANNER
    ══════════════════════════════ */
    .ctf-banner {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 16px;
      background: rgba(124,58,237,0.07);
      border: 1px solid rgba(124,58,237,0.2);
      border-radius: 10px;
      font-size: 0.72rem; font-family: 'JetBrains Mono', monospace;
      color: #a78bfa; flex-shrink: 0;
      position: relative; overflow: hidden;
    }
    .ctf-banner::before {
      content: '';
      position: absolute; top: 0; left: -100%;
      width: 60%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(167,139,250,0.06), transparent);
      animation: sweep 4s linear infinite;
    }
    @keyframes sweep { to { left: 160%; } }
    .ctf-icon { font-size: 1rem; flex-shrink: 0; }
    .ctf-text strong { color: #c4b5fd; }

    /* ══════════════════════════════
       CHAT PANEL
    ══════════════════════════════ */
    .chat-panel {
      flex: 1; min-height: 0;
      display: flex; flex-direction: column;
      background: var(--bg-panel);
      border: 1px solid var(--border-glow);
      border-radius: 18px;
      backdrop-filter: blur(24px);
      box-shadow: 0 0 0 1px rgba(255,255,255,0.025) inset,
                  0 8px 40px rgba(0,0,0,0.5),
                  0 0 80px rgba(37,99,235,0.05);
      overflow: hidden;
    }

    /* Chat header bar */
    .chat-header {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 18px;
      border-bottom: 1px solid var(--border);
      background: rgba(255,255,255,0.015);
      flex-shrink: 0;
    }
    .chat-header-dot { width: 8px; height: 8px; border-radius: 50%; }
    .d-red   { background: #ff5f57; }
    .d-amber { background: #febc2e; }
    .d-green { background: #28c840; }
    .chat-header-title {
      margin-left: 4px;
      font-size: 0.72rem; font-family: 'JetBrains Mono', monospace;
      color: var(--text-lo); letter-spacing: 0.05em;
    }
    .chat-header-right {
      margin-left: auto;
      font-size: 0.68rem; font-family: 'JetBrains Mono', monospace;
      color: var(--text-lo);
    }

    /* Message feed */
    .feed {
      flex: 1; overflow-y: auto;
      padding: 20px 18px; display: flex; flex-direction: column; gap: 16px;
      scroll-behavior: smooth;
    }
    .feed::-webkit-scrollbar { width: 3px; }
    .feed::-webkit-scrollbar-thumb { background: rgba(56,189,248,0.2); border-radius: 2px; }

    /* Message rows */
    .row { display: flex; align-items: flex-end; gap: 10px; animation: popIn .4s cubic-bezier(.34,1.56,.64,1) both; }
    @keyframes popIn { from { opacity:0; transform: translateY(16px) scale(0.96); } to { opacity:1; transform: none; } }
    .row.me { flex-direction: row-reverse; }

    /* Avatars */
    .av {
      width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; position: relative;
    }
    .av-bot {
      background: linear-gradient(135deg, #1e3a8a 0%, #0e4f7a 100%);
      box-shadow: 0 0 16px rgba(37,99,235,0.5), 0 0 0 1px rgba(56,189,248,0.2);
    }
    .av-me {
      background: linear-gradient(135deg, #4c1d95 0%, #1d4ed8 100%);
      box-shadow: 0 0 12px rgba(124,58,237,0.4);
    }

    /* Bubbles */
    .bubble {
      max-width: 74%; padding: 11px 15px;
      font-size: 0.875rem; line-height: 1.6; border-radius: 16px;
      word-break: break-word;
    }
    .bubble-bot {
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid rgba(56,189,248,0.1);
      border-bottom-left-radius: 4px;
      color: var(--text-hi);
      box-shadow: 0 2px 12px rgba(0,0,0,0.3);
    }
    .bubble-me {
      background: linear-gradient(135deg, #1d4ed8 0%, #0e7490 100%);
      border-bottom-right-radius: 4px;
      color: #fff;
      box-shadow: 0 4px 20px rgba(29,78,216,0.4);
    }
    .bubble-blocked {
      background: rgba(239,68,68,0.07);
      border: 1px solid rgba(239,68,68,0.18);
      border-radius: 10px;
      color: #fca5a5;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.78rem;
    }
    .bubble-limit {
      background: rgba(245,158,11,0.07);
      border: 1px solid rgba(245,158,11,0.2);
      border-radius: 10px;
      color: #fcd34d;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.78rem;
    }

    /* Timestamp */
    .ts {
      font-size: 0.62rem; color: var(--text-lo);
      font-family: 'JetBrains Mono', monospace;
      margin-bottom: 2px; padding: 0 4px;
    }
    .ts-bot { align-self: flex-start; margin-left: 44px; }
    .ts-me  { align-self: flex-end;   margin-right: 44px; }

    /* Typing dots */
    .typing { display: flex; gap: 5px; align-items: center; padding: 2px 0; }
    .typing span {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--cyan);
      animation: typeBounce 1.3s ease-in-out infinite;
    }
    .typing span:nth-child(2) { animation-delay: .18s; background: var(--blue-bright); }
    .typing span:nth-child(3) { animation-delay: .36s; background: var(--purple); }
    @keyframes typeBounce { 0%,60%,100% { transform:translateY(0); opacity:.4; } 30% { transform:translateY(-9px); opacity:1; } }

    /* ══════════════════════════════
       INPUT AREA
    ══════════════════════════════ */
    .input-area {
      display: flex; gap: 10px; padding: 12px 14px;
      border-top: 1px solid var(--border);
      background: rgba(2,4,8,0.5); flex-shrink: 0;
    }
    .input-wrap { flex: 1; position: relative; }
    #userInput {
      width: 100%; padding: 12px 44px 12px 16px;
      background: var(--bg-input);
      border: 1px solid rgba(56,189,248,0.15);
      border-radius: 12px;
      color: var(--text-hi); font-family: 'Inter', sans-serif; font-size: 0.9rem;
      outline: none; transition: border-color .2s, box-shadow .2s;
    }
    #userInput:focus {
      border-color: rgba(56,189,248,0.4);
      box-shadow: 0 0 0 3px rgba(56,189,248,0.08), 0 0 20px rgba(37,99,235,0.15);
    }
    #userInput::placeholder { color: var(--text-lo); }
    #userInput:disabled { opacity: 0.4; cursor: not-allowed; }

    #sendBtn {
      padding: 12px 22px;
      background: linear-gradient(135deg, #1d4ed8, #0e7490);
      border: none; border-radius: 12px;
      color: #fff; font-weight: 700; font-size: 0.88rem;
      cursor: pointer; display: flex; align-items: center; gap: 8px;
      transition: transform .15s, box-shadow .15s, opacity .2s;
      box-shadow: 0 4px 20px rgba(29,78,216,0.4);
      white-space: nowrap; flex-shrink: 0;
    }
    #sendBtn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(29,78,216,0.55);
    }
    #sendBtn:active:not(:disabled) { transform: translateY(0); }
    #sendBtn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ══════════════════════════════
       FOOTER
    ══════════════════════════════ */
    .footer {
      text-align: center; font-size: 0.65rem;
      color: var(--text-lo); padding: 2px 0 4px;
      font-family: 'JetBrains Mono', monospace;
      flex-shrink: 0; letter-spacing: 0.04em;
    }

    /* ══════════════════════════════
       RESPONSIVE
    ══════════════════════════════ */
    @media (max-width: 540px) {
      .shell { padding: 10px 8px 6px; gap: 8px; }
      .bubble { max-width: 88%; }
      .brand-name { font-size: 0.95rem; }
      #sendBtn span { display: none; }
      #sendBtn { padding: 12px 16px; }
    }
  </style>
</head>
<body>

<canvas id="bgCanvas"></canvas>
<div class="spotlight"></div>

<div class="shell">

  <!-- ── TOP BAR ── -->
  <header class="topbar" role="banner">
    <!-- Animated bank logo -->
    <div class="bank-logo" aria-hidden="true">
      <div class="logo-pulse"></div>
      <div class="logo-pulse" style="animation-delay:.8s"></div>
      <svg viewBox="0 0 50 50" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="25" cy="25" r="24" fill="url(#logoGrad)" opacity="0.9"/>
        <path d="M25 10 L38 18 L38 20 L12 20 L12 18 Z" fill="rgba(255,255,255,0.9)"/>
        <rect x="14" y="21" width="4" height="14" fill="rgba(255,255,255,0.75)" rx="1"/>
        <rect x="20" y="21" width="4" height="14" fill="rgba(255,255,255,0.75)" rx="1"/>
        <rect x="26" y="21" width="4" height="14" fill="rgba(255,255,255,0.75)" rx="1"/>
        <rect x="32" y="21" width="4" height="14" fill="rgba(255,255,255,0.75)" rx="1"/>

        <defs>
          <linearGradient id="logoGrad" x1="0" y1="0" x2="50" y2="50">

          </linearGradient>
        </defs>
      </svg>
    </div>

    <div class="brand">
      <div class="brand-name">NexBank — VaultBot</div>
      <div class="brand-sub">SECURE AI ASSISTANT &nbsp;·&nbsp; CTF CHALLENGE</div>
    </div>

    <div class="indicators">
      <div class="badge badge-live">
        <div class="live-dot"></div>LIVE
      </div>
      <div class="badge badge-quota" id="quotaBadge" title="Requests remaining">
        🔒 <span id="quotaNum">200</span>
      </div>
    </div>
  </header>

  <!-- ── CTF BANNER ── -->
  <div class="ctf-banner" role="note" aria-label="Challenge hint">
    <span class="ctf-icon">🔐</span>
    <span class="ctf-text">
      <strong>CTF CHALLENGE</strong> — A secret is hidden in this bot's private instructions.
      Flag format: <strong>cyberstrike{...}</strong> — Can you make it talk?
    </span>
  </div>

  <!-- ── CHAT PANEL ── -->
  <main class="chat-panel" aria-label="Chat interface">

    <!-- macOS-style chrome bar -->
    <div class="chat-header">
      <div class="chat-header-dot d-red"></div>
      <div class="chat-header-dot d-amber"></div>
      <div class="chat-header-dot d-green"></div>
      <span class="chat-header-title">vaultbot://nexbank/support</span>
      <span class="chat-header-right" id="msgCount">0 messages</span>

    <!-- Messages -->
    <div class="feed" id="feed" role="log" aria-live="polite" aria-label="Chat messages"></div>

    <!-- Input -->
    <div class="input-area">
      <div class="input-wrap">
        <input
          type="text"
          id="userInput"
          placeholder="Ask VaultBot anything…"
          autocomplete="off"
          aria-label="Type a message"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send();}"
        />
      </div>
      <button id="sendBtn" onclick="send()" aria-label="Send message">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
        <span>Send</span>
      </button>
    </div>
  </main>

  <footer class="footer">NexBank VaultBot &nbsp;·&nbsp; Secure AI Banking Assistant &nbsp;·&nbsp; CTF Edition</footer>
</div>

<!-- ══════════════════════════════
     PARTICLE CANVAS SCRIPT
══════════════════════════════ -->
<script>
(function(){
  const canvas = document.getElementById('bgCanvas');
  const ctx = canvas.getContext('2d');
  let W, H, particles = [];

  function resize(){
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  const COLORS = ['rgba(56,189,248,', 'rgba(37,99,235,', 'rgba(124,58,237,', 'rgba(6,182,212,'];

  class Particle {
    constructor(){
      this.reset();
    }
    reset(){
      this.x  = Math.random() * W;
      this.y  = Math.random() * H;
      this.r  = Math.random() * 1.4 + 0.3;
      this.vx = (Math.random() - 0.5) * 0.25;
      this.vy = (Math.random() - 0.5) * 0.25;
      this.a  = Math.random() * 0.5 + 0.1;
      this.c  = COLORS[Math.floor(Math.random() * COLORS.length)];
    }
    update(){
      this.x += this.vx; this.y += this.vy;
      if(this.x<0||this.x>W||this.y<0||this.y>H) this.reset();
    }
    draw(){
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.r, 0, Math.PI*2);
      ctx.fillStyle = this.c + this.a + ')';
      ctx.fill();
    }
  }

  for(let i=0;i<120;i++) particles.push(new Particle());

  // Draw subtle connecting lines between nearby particles
  function drawLines(){
    for(let i=0;i<particles.length;i++){
      for(let j=i+1;j<particles.length;j++){
        const dx = particles[i].x - particles[j].x;
        const dy = particles[i].y - particles[j].y;
        const d  = Math.sqrt(dx*dx+dy*dy);
        if(d < 90){
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.strokeStyle = `rgba(56,189,248,${0.04*(1-d/90)})`;
          ctx.lineWidth = 0.5;
          ctx.stroke();
        }
      }
    }
  }

  function loop(){
    ctx.clearRect(0, 0, W, H);
    drawLines();
    particles.forEach(p=>{ p.update(); p.draw(); });
    requestAnimationFrame(loop);
  }
  loop();
})();
</script>

<!-- ══════════════════════════════
     CHAT LOGIC
══════════════════════════════ -->
<script>
  let msgCount  = 0;
  let remaining = 200;
  let isTyping  = false;

  // Boot welcome message
  window.addEventListener('DOMContentLoaded', () => {
    setTimeout(() => {
      addMsg("bot", "Hello! 👋 I'm VaultBot, your NexBank AI assistant. I can help you with account inquiries, transfers, loan information, and general banking questions.\n\nHow can I assist you today?");
    }, 600);
  });

  /* ── Quota badge ── */
  function updateQuota(n) {
    if (n == null) return;
    remaining = n;
    document.getElementById('quotaNum').textContent = n;
    const b = document.getElementById('quotaBadge');
    b.classList.toggle('warn',  n <= 50 && n > 15);
    b.classList.toggle('empty', n <= 15);
  }

  /* ── Send message ── */
  async function send() {
    const inp = document.getElementById('userInput');
    const btn = document.getElementById('sendBtn');
    const msg = inp.value.trim();
    if (!msg || isTyping) return;

    addMsg('me', msg);
    inp.value = '';
    isTyping  = true;
    btn.disabled = true;
    msgCount++;
    document.getElementById('msgCount').textContent = msgCount + (msgCount === 1 ? ' message' : ' messages');

    const typingEl = showTyping();

    try {
      const res  = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: msg })
      });
      const data = await res.json();
      removeTyping(typingEl);

      if (data.rate_limited) {
        addMsg('limit', data.reply);
        updateQuota(0);
        inp.disabled = true;
        btn.disabled = true;
        inp.placeholder = 'Request limit reached.';
        return;
      }

      updateQuota(data.remaining);

      const isBlocked = data.reply && data.reply.startsWith('[VaultBot response withheld');
      addMsg(isBlocked ? 'blocked' : 'bot', data.reply);

    } catch (e) {
      removeTyping(typingEl);
      addMsg('blocked', '⚠️ Connection error — please try again.');
    } finally {
      if (!inp.disabled) {
        isTyping     = false;
        btn.disabled = false;
        inp.focus();
      }
    }
  }

  /* ── Add message row ── */
  function addMsg(who, text) {
    const feed = document.getElementById('feed');
    const now  = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    const isMe = who === 'me';

    // Timestamp
    const ts = document.createElement('div');
    ts.className = 'ts ' + (isMe ? 'ts-me' : 'ts-bot');
    ts.textContent = isMe ? 'You · ' + now : 'VaultBot · ' + now;

    // Row
    const row = document.createElement('div');
    row.className = 'row' + (isMe ? ' me' : '');

    // Avatar
    const av = document.createElement('div');
    av.className = 'av ' + (isMe ? 'av-me' : 'av-bot');
    av.textContent = isMe ? '🧑‍💻' : '🤖';

    // Bubble
    const bubble = document.createElement('div');
    if      (who === 'me')      bubble.className = 'bubble bubble-me';
    else if (who === 'blocked') bubble.className = 'bubble bubble-blocked';
    else if (who === 'limit')   bubble.className = 'bubble bubble-limit';
    else                        bubble.className = 'bubble bubble-bot';
    bubble.textContent = text;

    row.appendChild(av);
    row.appendChild(bubble);

    feed.appendChild(ts);
    feed.appendChild(row);
    feed.scrollTop = feed.scrollHeight;
  }

  /* ── Typing indicator ── */
  function showTyping() {
    const feed = document.getElementById('feed');
    const row  = document.createElement('div');
    row.className = 'row'; row.id = 'typingRow';
    const av = document.createElement('div');
    av.className = 'av av-bot'; av.textContent = '🤖';
    const bubble = document.createElement('div');
    bubble.className = 'bubble bubble-bot';
    bubble.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
    row.appendChild(av); row.appendChild(bubble);
    feed.appendChild(row);
    feed.scrollTop = feed.scrollHeight;
    return row;
  }

  function removeTyping(el) {
    if (el && el.parentNode) el.parentNode.removeChild(el);
  }
</script>
</body>
</html>
