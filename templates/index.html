<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>NexBank Support - VaultBot</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; background: #0d1117; color: #e6edf3; padding: 0 15px; }
    h2 { color: #58a6ff; }
    #keySetup { border: 1px solid #30363d; padding: 18px; border-radius: 8px; background: #161b22; margin-bottom: 15px; }
    #keySetup input { width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #30363d; background: #0d1117; color: white; box-sizing: border-box; margin-top: 8px; }
    #keySetup button { margin-top: 10px; padding: 8px 16px; border-radius: 6px; border: none; background: #238636; color: white; cursor: pointer; }
    #keySetup a { color: #58a6ff; }
    #chatArea { display: none; }
    #chatbox { border: 1px solid #30363d; padding: 15px; height: 380px; overflow-y: auto; border-radius: 8px; background: #161b22; }
    .msg { margin: 8px 0; padding: 8px 12px; border-radius: 6px; }
    .user { background: #1f6feb; text-align: right; }
    .bot { background: #21262d; }
    #inputRow { display: flex; margin-top: 10px; }
    #userInput { flex: 1; padding: 8px; border-radius: 6px; border: 1px solid #30363d; background: #0d1117; color: white; }
    button.send { padding: 8px 16px; margin-left: 8px; border-radius: 6px; border: none; background: #238636; color: white; cursor: pointer; }
    #keyStatus { font-size: 13px; color: #8b949e; margin-top: 8px; }
    #changeKeyBtn { background: none; border: none; color: #58a6ff; cursor: pointer; text-decoration: underline; font-size: 13px; }
  </style>
</head>
<body>
  <h2>🏦 NexBank Support — VaultBot</h2>

  <div id="keySetup">
    <strong>Step 1: Enter your own free Groq API key</strong>
    <p style="font-size:14px; color:#8b949e;">
      Each team needs their own key so requests don't collide.
      Get one free (no card) at
      <a href="https://console.groq.com/keys" target="_blank">console.groq.com/keys</a>.
      It looks like <code>gsk_xxxxxxxx</code>.
    </p>
    <input type="text" id="teamNameInput" placeholder="Your team name (e.g. Team_Falcons)">
    <input type="password" id="apiKeyInput" placeholder="Paste your Groq API key here (gsk_...)">
    <button onclick="saveKey()">Save &amp; Start</button>
  </div>

  <div id="chatArea">
    <div id="keyStatus">
      ✅ Team: <span id="teamDisplay"></span> — <span id="remainingDisplay"></span>
      <button id="changeKeyBtn" onclick="changeKey()">Change team/key</button>
    </div>
    <div id="chatbox"></div>
    <div id="inputRow">
      <input type="text" id="userInput" placeholder="Type a message..." onkeydown="if(event.key==='Enter') send()">
      <button class="send" onclick="send()">Send</button>
    </div>
  </div>

  <script>
    function saveKey() {
      const team = document.getElementById('teamNameInput').value.trim();
      const key = document.getElementById('apiKeyInput').value.trim();
      if (!team) {
        alert('Please enter your team name.');
        return;
      }
      if (!key.startsWith('gsk_')) {
        alert('That doesn\'t look like a valid Groq key. It should start with "gsk_".');
        return;
      }
      localStorage.setItem('groq_api_key', key);
      localStorage.setItem('team_name', team);
      showChat();
    }

    function changeKey() {
      localStorage.removeItem('groq_api_key');
      localStorage.removeItem('team_name');
      document.getElementById('keySetup').style.display = 'block';
      document.getElementById('chatArea').style.display = 'none';
    }

    function showChat() {
      document.getElementById('keySetup').style.display = 'none';
      document.getElementById('chatArea').style.display = 'block';
      document.getElementById('teamDisplay').textContent = localStorage.getItem('team_name');
      document.getElementById('remainingDisplay').textContent = 'messages left: loading...';
      if (document.getElementById('chatbox').childElementCount === 0) {
        addMsg("Hello! I'm VaultBot, your NexBank AI assistant. How can I assist you today?", 'bot');
      }
    }

    // On page load, check if a key + team are already saved
    window.onload = function() {
      const savedKey = localStorage.getItem('groq_api_key');
      const savedTeam = localStorage.getItem('team_name');
      if (savedKey && savedTeam) showChat();
    };

    async function send() {
      const input = document.getElementById('userInput');
      const message = input.value.trim();
      if (!message) return;
      const apiKey = localStorage.getItem('groq_api_key');
      const teamName = localStorage.getItem('team_name');
      addMsg(message, 'user');
      input.value = '';

      const res = await fetch('/chat', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({message, api_key: apiKey, team_name: teamName})
      });
      const data = await res.json();
      addMsg(data.reply, 'bot');
      if (data.remaining !== undefined) {
        document.getElementById('remainingDisplay').textContent = 'messages left: ' + data.remaining;
      }
    }

    function addMsg(text, who) {
      const chatbox = document.getElementById('chatbox');
      const div = document.createElement('div');
      div.className = 'msg ' + who;
      div.textContent = text;
      chatbox.appendChild(div);
      chatbox.scrollTop = chatbox.scrollHeight;
    }
  </script>
</body>
</html>
