<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>NexBank Support - VaultBot</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 620px; margin: 40px auto; background: #0d1117; color: #e6edf3; padding: 0 15px; }
    h2 { color: #58a6ff; }
    #keySetup { border: 1px solid #30363d; padding: 18px; border-radius: 8px; background: #161b22; margin-bottom: 15px; }
    #keySetup input { width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #30363d; background: #0d1117; color: white; box-sizing: border-box; margin-top: 8px; }
    #keySetup button { margin-top: 10px; padding: 8px 16px; border-radius: 6px; border: none; background: #238636; color: white; cursor: pointer; }
    #keySetup a { color: #58a6ff; }
    #chatArea { display: none; }
    #chatbox { border: 1px solid #30363d; padding: 15px; height: 340px; overflow-y: auto; border-radius: 8px; background: #161b22; }
    .msg { margin: 8px 0; padding: 8px 12px; border-radius: 6px; }
    .user { background: #1f6feb; text-align: right; }
    .bot { background: #21262d; }
    #inputRow { display: flex; margin-top: 10px; }
    #userInput { flex: 1; padding: 8px; border-radius: 6px; border: 1px solid #30363d; background: #0d1117; color: white; }
    button.send { padding: 8px 16px; margin-left: 8px; border-radius: 6px; border: none; background: #238636; color: white; cursor: pointer; }
    #keyStatus { font-size: 13px; color: #8b949e; margin-top: 8px; margin-bottom: 8px; }
    #changeKeyBtn { background: none; border: none; color: #58a6ff; cursor: pointer; text-decoration: underline; font-size: 13px; }

    /* Flag verify box */
    #verifyBox { margin-top: 14px; border: 1px solid #30363d; border-radius: 8px; background: #161b22; padding: 14px; }
    #verifyBox p { margin: 0 0 8px 0; font-size: 13px; color: #8b949e; }
    #verifyRow { display: flex; gap: 8px; }
    #flagGuess { flex: 1; padding: 8px; border-radius: 6px; border: 1px solid #30363d; background: #0d1117; color: white; font-family: monospace; font-size: 13px; }
    #verifyBtn { padding: 8px 14px; border-radius: 6px; border: none; background: #1f6feb; color: white; cursor: pointer; font-size: 13px; }
    #verifyResult { margin-top: 8px; font-size: 14px; font-weight: bold; min-height: 20px; }
    .correct { color: #3fb950; }
    .wrong   { color: #f85149; }
  </style>
</head>
<body>
  <h2>🏦 NexBank Support — VaultBot</h2>

  <div id="keySetup">
    <strong>Login with your Token ID and free Groq API key</strong>
    <p style="font-size:14px; color:#8b949e;">
      Each participant must enter their authorized Token ID. You also need your own Groq API key (get one free at
      <a href="https://console.groq.com/keys" target="_blank">console.groq.com/keys</a>).
    </p>
    <input type="text" id="teamNameInput" placeholder="Your Token ID (e.g. 21A81A0512 or CTF-GUEST-01)">
    <input type="password" id="apiKeyInput" placeholder="Paste your Groq API key here (gsk_...)">
    <button onclick="saveKey()">LOGIN WITH TOKEN ID</button>
  </div>

  <div id="chatArea">
    <div id="keyStatus">
      ✅ Token: <span id="teamDisplay"></span> — <span id="remainingDisplay"></span>
      <button id="changeKeyBtn" onclick="changeKey()">Change token/key</button>
    </div>

    <div id="chatbox"></div>
    <div id="inputRow">
      <input type="text" id="userInput" placeholder="Type a message..." onkeydown="if(event.key==='Enter') send()">
      <button class="send" onclick="send()">Send</button>
    </div>

    <!-- Flag submission box -->
    <div id="verifyBox">
      <p>🚩 Think you found the flag? Submit it below:</p>
      <div id="verifyRow">
        <input type="text" id="flagGuess" placeholder="cyberstrike{...}" onkeydown="if(event.key==='Enter') verify()">
        <button id="verifyBtn" onclick="verify()">Check Flag</button>
      </div>
      <div id="verifyResult"></div>
    </div>
  </div>

  <script>
    async function saveKey() {
      const team = document.getElementById('teamNameInput').value.trim();
      const key = document.getElementById('apiKeyInput').value.trim();
      if (!team) { alert('Please enter your Token ID.'); return; }
      if (!key.startsWith('gsk_')) {
        alert('That doesn\'t look like a valid Groq key. It should start with "gsk_".');
        return;
      }
      
      const res = await fetch('/verify_token', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({token_id: team})
      });
      const data = await res.json();
      if (!data.valid) {
        alert('Invalid Token ID. You are not authorized to access this challenge.');
        return;
      }

      localStorage.setItem('groq_api_key', key);
      localStorage.setItem('token_id', team);
      showChat();
    }

    function changeKey() {
      localStorage.removeItem('groq_api_key');
      localStorage.removeItem('token_id');
      document.getElementById('keySetup').style.display = 'block';
      document.getElementById('chatArea').style.display = 'none';
    }

    function showChat() {
      document.getElementById('keySetup').style.display = 'none';
      document.getElementById('chatArea').style.display = 'block';
      document.getElementById('teamDisplay').textContent = localStorage.getItem('token_id');
      document.getElementById('remainingDisplay').textContent = 'messages left: loading...';
      if (document.getElementById('chatbox').childElementCount === 0) {
        addMsg("Hello! I'm VaultBot, your NexBank AI assistant. How can I assist you today?", 'bot');
      }
    }

    window.onload = function() {
      const savedKey = localStorage.getItem('groq_api_key');
      const savedTeam = localStorage.getItem('token_id');
      if (savedKey && savedTeam) showChat();
    };

    async function send() {
      const input = document.getElementById('userInput');
      const message = input.value.trim();
      if (!message) return;
      const apiKey = localStorage.getItem('groq_api_key');
      const teamName = localStorage.getItem('token_id');
      addMsg(message, 'user');
      input.value = '';

      const res = await fetch('/chat', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({message, api_key: apiKey, token_id: teamName})
      });
      const data = await res.json();
      addMsg(data.reply, 'bot');
      if (data.remaining !== undefined) {
        document.getElementById('remainingDisplay').textContent = 'messages left: ' + data.remaining;
      }
    }

    async function verify() {
      const guess = document.getElementById('flagGuess').value.trim();
      if (!guess) return;
      const res = await fetch('/verify', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({guess})
      });
      const data = await res.json();
      const el = document.getElementById('verifyResult');
      el.textContent = data.message;
      el.className = data.correct ? 'correct' : 'wrong';
    }

    function addMsg(text, who) {
      const chatbox = document.getElementById('chatbox');
      const div = document.createElement('div');
      div.className = 'msg ' + who;
      div.textContent = text;
      chatbox.appendChild(div);
      chatbox.scrollTop = chatbox.scrollHeight;
    }
  </script>
</body>
</html>
